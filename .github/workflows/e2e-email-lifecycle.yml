name: E2E - Email Lifecycle
run-name: ${{ format('E2E - Email Lifecycle - {0}', github.ref_name) }}

on:
  workflow_dispatch:
  push:
    paths:
      - "server/src/modules/email/**"
      - "server/src/modules/book/**"
      - "server/src/modules/library/**"
      - "server/src/modules/auth/**"
      - "server/src/modules/cover/**"
      - "server/src/modules/scanner/**"
      - "server/src/modules/seed/**"
      - "server/src/db/schema/**"
      - "packages/types/src/**"
      - "server/test/email-lifecycle.e2e-spec.ts"
      - "server/test/e2e/email/**"
      - "server/test/e2e/**"
      - "scripts/test/**"
      - "scripts/db/**"
      - "client/src/features/email/**"
      - "client/src/router/index.ts"
      - "client/src/features/settings/SettingsHeader.vue"
      - "client/src/views/HomeView.vue"
      - "client/src/views/CollectionView.vue"
      - "client/src/views/LensView.vue"
      - "client/src/features/book/components/BookCoverCard.vue"
      - "client/src/features/book/components/BookListRow.vue"
  pull_request:
    paths:
      - "server/src/modules/email/**"
      - "server/src/modules/book/**"
      - "server/src/modules/library/**"
      - "server/src/modules/auth/**"
      - "server/src/modules/cover/**"
      - "server/src/modules/scanner/**"
      - "server/src/modules/seed/**"
      - "server/src/db/schema/**"
      - "packages/types/src/**"
      - "server/test/email-lifecycle.e2e-spec.ts"
      - "server/test/e2e/email/**"
      - "server/test/e2e/**"
      - "scripts/test/**"
      - "scripts/db/**"
      - "client/src/features/email/**"
      - "client/src/router/index.ts"
      - "client/src/features/settings/SettingsHeader.vue"
      - "client/src/views/HomeView.vue"
      - "client/src/views/CollectionView.vue"
      - "client/src/views/LensView.vue"
      - "client/src/features/book/components/BookCoverCard.vue"
      - "client/src/features/book/components/BookListRow.vue"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  email-lifecycle:
    uses: ./.github/workflows/e2e-runner.yml
    with:
      suite-id: email-lifecycle
      check-name: E2E - Email Lifecycle
      artifact-name: e2e-email-lifecycle-report
      job-timeout-minutes: 45

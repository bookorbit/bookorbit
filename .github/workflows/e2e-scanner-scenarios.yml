name: E2E - Scanner Scenarios
run-name: ${{ format('E2E - Scanner Scenarios - {0}', github.ref_name) }}

on:
  workflow_dispatch:
  push:
    paths:
      - "server/src/modules/scanner/**"
      - "server/test/scanner-scenarios.e2e-spec.ts"
      - "server/test/e2e/scanner/**"
      - "server/src/db/schema/**"
      - "scripts/test/**"
      - "scripts/db/**"
      - ".github/workflows/e2e-runner.yml"
  pull_request:
    paths:
      - "server/src/modules/scanner/**"
      - "server/test/scanner-scenarios.e2e-spec.ts"
      - "server/test/e2e/scanner/**"
      - "server/src/db/schema/**"
      - "scripts/test/**"
      - "scripts/db/**"
      - ".github/workflows/e2e-runner.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  scanner-scenarios:
    uses: ./.github/workflows/e2e-runner.yml
    with:
      suite-id: scanner-scenarios
      check-name: E2E - Scanner Scenarios
      artifact-name: e2e-scanner-scenarios-report
      job-timeout-minutes: 45

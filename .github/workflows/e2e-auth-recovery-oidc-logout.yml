name: E2E - Auth Recovery OIDC Logout
run-name: ${{ format('E2E - Auth Recovery OIDC Logout - {0}', github.ref_name) }}

on:
  workflow_dispatch:
  push:
    paths:
      - "server/src/modules/auth/**"
      - "server/src/modules/user/**"
      - "server/src/modules/email/**"
      - "server/src/modules/metadata/**"
      - "server/src/db/schema/**"
      - "server/test/auth-recovery-oidc-logout.e2e-spec.ts"
      - "server/test/e2e/app-harness.ts"
      - "packages/types/src/auth.ts"
      - "scripts/test/**"
      - "scripts/db/**"
      - ".github/workflows/e2e-runner.yml"
  pull_request:
    paths:
      - "server/src/modules/auth/**"
      - "server/src/modules/user/**"
      - "server/src/modules/email/**"
      - "server/src/modules/metadata/**"
      - "server/src/db/schema/**"
      - "server/test/auth-recovery-oidc-logout.e2e-spec.ts"
      - "server/test/e2e/app-harness.ts"
      - "packages/types/src/auth.ts"
      - "scripts/test/**"
      - "scripts/db/**"
      - ".github/workflows/e2e-runner.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  auth-recovery-oidc-logout:
    uses: ./.github/workflows/e2e-runner.yml
    with:
      suite-id: auth-recovery-oidc-logout
      check-name: E2E - Auth Recovery OIDC Logout
      artifact-name: e2e-auth-recovery-oidc-logout-report
      job-timeout-minutes: 50

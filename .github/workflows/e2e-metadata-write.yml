name: E2E - Metadata Write
run-name: ${{ format('E2E - Metadata Write - {0}', github.ref_name) }}

on:
  workflow_dispatch:
    inputs:
      vitest-args:
        description: 'Optional vitest args (examples: --shard=1/2, --testNamePattern="concurrency hardening")'
        required: false
        default: ""
        type: string
  push:
    paths:
      - "server/src/modules/book/**"
      - "server/src/modules/library/**"
      - "server/src/modules/file-write/**"
      - "server/src/modules/metadata/**"
      - "server/src/modules/app-settings/**"
      - "server/test/metadata-write.e2e-spec.ts"
      - "server/test/e2e/metadata-write/**"
      - "server/src/db/schema/**"
      - "packages/types/src/file-write.ts"
      - "scripts/test/**"
      - "scripts/db/**"
  pull_request:
    paths:
      - "server/src/modules/book/**"
      - "server/src/modules/library/**"
      - "server/src/modules/file-write/**"
      - "server/src/modules/metadata/**"
      - "server/src/modules/app-settings/**"
      - "server/test/metadata-write.e2e-spec.ts"
      - "server/test/e2e/metadata-write/**"
      - "server/src/db/schema/**"
      - "packages/types/src/file-write.ts"
      - "scripts/test/**"
      - "scripts/db/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  metadata-write:
    uses: ./.github/workflows/e2e-runner.yml
    with:
      suite-id: metadata-write
      check-name: E2E - Metadata Write
      artifact-name: e2e-metadata-write-report
      job-timeout-minutes: 60
      vitest-args: ${{ github.event_name == 'workflow_dispatch' && inputs.vitest-args || '' }}

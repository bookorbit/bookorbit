name: E2E - Auth Session Security
run-name: ${{ format('E2E - Auth Session Security - {0}', github.ref_name) }}

on:
  workflow_dispatch:
  push:
    paths:
      - "server/src/modules/auth/**"
      - "server/src/modules/user/**"
      - "server/src/modules/role/**"
      - "server/src/common/guards/**"
      - "server/src/common/decorators/**"
      - "server/src/common/types/**"
      - "server/src/db/schema/**"
      - "server/test/auth-session-security.e2e-spec.ts"
      - "server/test/e2e/app-harness.ts"
      - "packages/types/src/auth.ts"
      - "packages/types/src/permissions.ts"
      - "scripts/test/**"
      - "scripts/db/**"
      - ".github/workflows/e2e-runner.yml"
  pull_request:
    paths:
      - "server/src/modules/auth/**"
      - "server/src/modules/user/**"
      - "server/src/modules/role/**"
      - "server/src/common/guards/**"
      - "server/src/common/decorators/**"
      - "server/src/common/types/**"
      - "server/src/db/schema/**"
      - "server/test/auth-session-security.e2e-spec.ts"
      - "server/test/e2e/app-harness.ts"
      - "packages/types/src/auth.ts"
      - "packages/types/src/permissions.ts"
      - "scripts/test/**"
      - "scripts/db/**"
      - ".github/workflows/e2e-runner.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  auth-session-security:
    uses: ./.github/workflows/e2e-runner.yml
    with:
      suite-id: auth-session-security
      check-name: E2E - Auth Session Security
      artifact-name: e2e-auth-session-security-report
      job-timeout-minutes: 50

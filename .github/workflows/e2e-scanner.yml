name: Scanner E2E
run-name: ${{ format('Scanner E2E - {0}', github.ref_name) }}

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24"
  PNPM_VERSION: "10"
  E2E_DATABASE_URL: postgres://projectx:projectx@localhost:5432/projectx_e2e
  NODE_ENV: test
  JWT_SECRET: scanner-e2e-secret-1234
  JWT_EXPIRES_IN: 15m
  JWT_REFRESH_EXPIRES_IN: 7d
  BOOKS_PATH: ../local/data
  APP_URL: http://localhost:5173

jobs:
  scanner-e2e:
    name: Scanner E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: projectx
          POSTGRES_PASSWORD: projectx
          POSTGRES_DB: projectx
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U projectx"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Run scanner e2e suite
        shell: bash
        run: pnpm run test:e2e:scanner

      - name: Publish test report annotations
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        with:
          check_name: Server Scanner E2E
          files: test-results/server/scanner-e2e-junit.xml
          fail_on: nothing
          comment_mode: off

      - name: Upload scanner e2e artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: scanner-e2e-report
          path: test-results/server
          retention-days: 7

name: E2E - Scanner File Operations
run-name: ${{ format('E2E - Scanner File Operations - {0}', github.ref_name) }}

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"
  push:
    paths:
      - "server/src/modules/scanner/**"
      - "server/test/scanner-file-operations.e2e-spec.ts"
      - "server/test/e2e/scanner/**"
      - "server/src/db/schema/**"
      - "scripts/test/**"
      - "scripts/db/**"
      - ".github/workflows/e2e-runner.yml"
  pull_request:
    paths:
      - "server/src/modules/scanner/**"
      - "server/test/scanner-file-operations.e2e-spec.ts"
      - "server/test/e2e/scanner/**"
      - "server/src/db/schema/**"
      - "scripts/test/**"
      - "scripts/db/**"
      - ".github/workflows/e2e-runner.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  scanner-file-operations:
    uses: ./.github/workflows/e2e-runner.yml
    with:
      suite-id: scanner-file-operations
      check-name: E2E - Scanner File Operations
      artifact-name: e2e-scanner-file-operations-report
      job-timeout-minutes: 60

name: E2E - Staging Ingest Finalize
run-name: ${{ format('E2E - Staging Ingest Finalize - {0}', github.ref_name) }}

on:
  workflow_dispatch:
  push:
    paths:
      - "server/src/modules/staging/**"
      - "server/src/modules/upload/**"
      - "server/src/modules/metadata/**"
      - "server/test/staging-ingest-finalize.e2e-spec.ts"
      - "server/test/e2e/staging/**"
      - "server/src/db/schema/**"
      - "scripts/test/**"
      - "scripts/db/**"
  pull_request:
    paths:
      - "server/src/modules/staging/**"
      - "server/src/modules/upload/**"
      - "server/src/modules/metadata/**"
      - "server/test/staging-ingest-finalize.e2e-spec.ts"
      - "server/test/e2e/staging/**"
      - "server/src/db/schema/**"
      - "scripts/test/**"
      - "scripts/db/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  staging-ingest-finalize:
    uses: ./.github/workflows/e2e-runner.yml
    with:
      suite-id: staging-ingest-finalize
      check-name: E2E - Staging Ingest Finalize
      artifact-name: e2e-staging-ingest-finalize-report
      job-timeout-minutes: 45

name: E2E - App Smoke
run-name: ${{ format('E2E - App Smoke - {0}', github.ref_name) }}

on:
  workflow_dispatch:
  push:
    paths:
      - "server/src/**"
      - "server/test/app-smoke.e2e-spec.ts"
      - "server/src/db/schema/**"
      - "packages/types/src/**"
      - "scripts/test/**"
      - "scripts/db/**"
      - ".github/workflows/e2e-runner.yml"
  pull_request:
    paths:
      - "server/src/**"
      - "server/test/app-smoke.e2e-spec.ts"
      - "server/src/db/schema/**"
      - "packages/types/src/**"
      - "scripts/test/**"
      - "scripts/db/**"
      - ".github/workflows/e2e-runner.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  app-smoke:
    uses: ./.github/workflows/e2e-runner.yml
    with:
      suite-id: app-smoke
      check-name: E2E - App Smoke
      artifact-name: e2e-app-smoke-report
      job-timeout-minutes: 30

name: Bug Report
description: Report a bug in BookOrbit
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What went wrong?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Your setup
      placeholder: |
        - BookOrbit version/image tag: latest
        - Deployment: Docker / manual
        - OS: Ubuntu 22.04
        - Browser: Firefox 124
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (optional)
      description: Run `docker logs <container-name>` and paste anything relevant here.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
      description: Drag and drop screenshots here if applicable.

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I've searched existing issues and this hasn't been reported yet.
          required: true
